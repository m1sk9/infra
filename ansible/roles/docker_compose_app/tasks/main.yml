---
- name: "{{ app_name }} | Create deploy directory"
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    mode: "0755"
  check_mode: false

- name: "{{ app_name }} | Create data directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ app_dirs }}"
  check_mode: false

- name: "{{ app_name }} | Deploy compose file"
  ansible.builtin.copy:
    src: "{{ app_name }}/compose.yaml"
    dest: "{{ app_dir }}/compose.yaml"
    mode: "0644"
  check_mode: false

- name: "{{ app_name }} | Deploy service files (env, config)"
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode | default('0600') }}"
  loop: "{{ app_files }}"
  no_log: true

- name: "{{ app_name }} | Start stack"
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
    remove_orphans: true
  register: compose_up
  when: not ansible_check_mode
