---
- name: Deploy Docker Compose services on s1
  hosts: s1
  tasks:
    - name: Deploy val-random-discord
      ansible.builtin.include_role:
        name: docker_compose_app
      vars:
        app_name: val-random-discord
        app_files:
          - src: val-random-discord/env
            dest: "{{ ansible_facts['env']['HOME'] }}/services/val-random-discord/.env"

    - name: Deploy babyrite
      ansible.builtin.include_role:
        name: docker_compose_app
      vars:
        app_name: babyrite
        app_dirs:
          - "{{ ansible_facts['env']['HOME'] }}/babyrite-data"
        app_files:
          - src: babyrite/env
            dest: "{{ ansible_facts['env']['HOME'] }}/services/babyrite/.env"
          - src: babyrite/config.toml
            dest: "{{ ansible_facts['env']['HOME'] }}/babyrite-data/config.toml"
            mode: "0644"

    - name: Deploy wallos
      ansible.builtin.include_role:
        name: docker_compose_app
      vars:
        app_name: wallos
        app_dirs:
          - "{{ ansible_facts['env']['HOME'] }}/wallos-data/db"
          - "{{ ansible_facts['env']['HOME'] }}/wallos-data/logos"

    - name: Deploy chime
      ansible.builtin.include_role:
        name: docker_compose_app
      vars:
        app_name: chime
        app_dirs:
          - "{{ ansible_facts['env']['HOME'] }}/chime-data"
        app_files:
          - src: chime/env
            dest: "{{ ansible_facts['env']['HOME'] }}/services/chime/.env"
          - src: chime/config.toml
            dest: "{{ ansible_facts['env']['HOME'] }}/chime-data/config.toml"
            mode: "0644"

    - name: Verify chime container reached running state
      community.docker.docker_container_info:
        name: chime-app-1
      register: chime_info
      until:
        - chime_info.container is defined
        - chime_info.container is not none
        - chime_info.container.State.Status | default('') == "running"
      retries: 12
      delay: 5
      when: not ansible_check_mode

    - name: Settle window for chime
      ansible.builtin.pause:
        seconds: 10
      when: not ansible_check_mode

    - name: Re-check chime stability
      community.docker.docker_container_info:
        name: chime-app-1
      register: chime_info_after
      when: not ansible_check_mode

    - name: Fail if chime restarted during settle window
      ansible.builtin.fail:
        msg: "chime container restarted during settle window (restart_count={{ chime_info_after.container.RestartCount }})"
      when:
        - not ansible_check_mode
        - chime_info_after.container is defined
        - chime_info_after.container is not none
        - chime_info_after.container.RestartCount | default(0) | int > 0
