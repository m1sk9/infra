---
- name: Deploy Docker Compose services on s1
  hosts: s1
  tasks:
    - name: Deploy babyrite
      ansible.builtin.include_role:
        name: docker_compose_app
      vars:
        app_name: babyrite
        app_dirs:
          - "{{ ansible_facts['env']['HOME'] }}/babyrite-data"
        app_files:
          - src: babyrite/env
            dest: "{{ ansible_facts['env']['HOME'] }}/services/babyrite/.env"
          - src: babyrite/config.toml
            dest: "{{ ansible_facts['env']['HOME'] }}/babyrite-data/config.toml"
            mode: "0644"

    - name: Deploy wallos
      ansible.builtin.include_role:
        name: docker_compose_app
      vars:
        app_name: wallos
        app_dirs:
          - "{{ ansible_facts['env']['HOME'] }}/wallos-data/db"
          - "{{ ansible_facts['env']['HOME'] }}/wallos-data/logos"

    - name: Deploy chime
      ansible.builtin.include_role:
        name: docker_compose_app
      vars:
        app_name: chime
        app_dirs:
          - "{{ ansible_facts['env']['HOME'] }}/chime-data"
        app_files:
          - src: chime/env
            dest: "{{ ansible_facts['env']['HOME'] }}/services/chime/.env"
          - src: chime/config.toml
            dest: "{{ ansible_facts['env']['HOME'] }}/chime-data/config.toml"
            mode: "0644"

    - name: Settle window for chime
      ansible.builtin.pause:
        seconds: 10
      when: not ansible_check_mode

    - name: Check chime restart count after settle
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - -f
          - "{% raw %}{{.RestartCount}}{% endraw %}"
          - chime-app-1
      register: chime_restart
      changed_when: false
      when: not ansible_check_mode

    - name: Fail if chime restarted during settle window
      ansible.builtin.fail:
        msg: "chime container restarted during settle window (restart_count={{ chime_restart.stdout }})"
      when:
        - not ansible_check_mode
        - (chime_restart.stdout | int) > 0
