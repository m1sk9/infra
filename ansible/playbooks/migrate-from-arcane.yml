---
# One-off migration from Arcane-managed stacks to Ansible-managed ones.
# Run this once, then use services.yml for ongoing deploys.
#
#   ansible-playbook playbooks/migrate-from-arcane.yml
#   ansible-playbook playbooks/services.yml
- name: Migrate services from Arcane to Ansible
  hosts: s1
  tasks:
    - name: Stop Arcane-managed stacks (keeps bind-mounted data)
      ansible.builtin.command:
        cmd: "docker compose -p {{ item }} down"
      loop:
        - val-random-discord
        - babyrite
        - wallos
      register: stack_down
      changed_when: "'Removed' in stack_down.stderr or 'Stopped' in stack_down.stderr"
      failed_when: false

    - name: Check whether wallos data is already migrated
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/wallos-data"
      register: wallos_data

    - name: Copy wallos data from /root to home
      become: true
      ansible.builtin.command:
        cmd: "cp -a /root/wallos-data {{ ansible_facts['env']['HOME'] }}/wallos-data"
        creates: "{{ ansible_facts['env']['HOME'] }}/wallos-data"
      when: not wallos_data.stat.exists

    - name: Fix ownership of migrated wallos data
      become: true
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/wallos-data"
        owner: "{{ ansible_facts['user_id'] }}"
        group: "{{ ansible_facts['user_id'] }}"
        recurse: true
      when: not wallos_data.stat.exists

    - name: Stop the Arcane UI
      ansible.builtin.command:
        cmd: "docker compose -p acrane down"
      register: arcane_down
      changed_when: "'Removed' in arcane_down.stderr or 'Stopped' in arcane_down.stderr"
      failed_when: false
