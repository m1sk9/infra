name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  pull-requests: write

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  terraform-apply:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./terraform
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: jdx/mise-action@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=10m

      - name: Terraform Apply
        run: terraform apply -input=false -no-color -auto-approve -lock-timeout=10m

  ansible-deploy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./ansible
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Development Environment
        uses: jdx/mise-action@v4

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          use-cache: "true"

      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass

      - name: Deploy services
        run: ansible-playbook playbooks/services.yml

      - name: Deploy backup
        run: ansible-playbook playbooks/backup.yml

      - name: Cleanup
        if: always()
        run: rm -f .vault_pass
