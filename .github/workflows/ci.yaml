name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./terraform
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Development Environment
        uses: jdx/mise-action@v4

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Lint
        run: tflint

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=10m

  ansible-plan:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./ansible
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Development Environment
        uses: jdx/mise-action@v4

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass

      - name: Syntax check
        run: |
          ansible-playbook playbooks/site.yml --syntax-check
          ansible-playbook playbooks/services.yml --syntax-check
          ansible-playbook playbooks/backup.yml --syntax-check

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          use-cache: "true"

      - name: Plan (check + diff)
        run: |
          ansible-playbook playbooks/services.yml --check --diff
          ansible-playbook playbooks/backup.yml --check --diff

      - name: Cleanup
        if: always()
        run: rm -f .vault_pass

  tailscale-acl-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Render policy file
        run: envsubst '${NEXTDNS_PROFILE_ID}' < tailscale/policy.hujson > tailscale/policy.rendered.hujson
        env:
          NEXTDNS_PROFILE_ID: ${{ secrets.NEXTDNS_PROFILE_ID }}

      - name: Test ACL
        uses: tailscale/gitops-acl-action@v1
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID_ACL }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET_ACL }}
          tailnet: ${{ secrets.TS_TAILNET }}
          action: test
          policy-file: ./tailscale/policy.rendered.hujson
